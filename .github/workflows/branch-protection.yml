name: Configure Branch Protection

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/branch-protection.yml'
  workflow_dispatch:

jobs:
  protect-main:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      # Requires a repository secret named REPO_ADMIN_PAT containing a
      # classic personal access token with the `repo` scope and admin
      # access to this repository.  The default GITHUB_TOKEN cannot
      # modify branch-protection rules.
      - name: Apply branch protection rules to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REPO_ADMIN_PAT }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: {
                strict: true,
                // Must match the `name` field of the job in pr-check.yml exactly.
                contexts: ['PR Check']
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true,
                required_approving_review_count: 1
              },
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false
            });
            console.log('Branch protection applied to main');
